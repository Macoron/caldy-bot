[agent]
model = "claude-haiku-4-5"
system_prompt = "prompt.md"
timezone = "Europe/Berlin"
history_window = 20
compress_history = false

[whisper]
model = "whisper-1"

[reminders]
poll_interval_minutes = 15
reminder_minutes = 15
notified_file = "notified_events.json"

[logging]
level = "INFO"
file = "bot.log"
format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
